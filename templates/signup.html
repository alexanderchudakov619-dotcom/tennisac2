<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TennisAC — Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <nav class="nav">
    <div class="nav-logo">Tennis<span>AC</span></div>
  </nav>

  <section class="auth-section">
    <div class="auth-card">
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-sub">Start getting personalized coaching today</p>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="flash-msg">{{ messages[0] }}</div>
        {% endif %}
      {% endwith %}

      <form action="/signup" method="POST">
        <div class="field-group">
          <label class="field-label">Full Name</label>
          <input type="text" name="name" class="input" placeholder="Alex" required />
        </div>
        <div class="field-group">
          <label class="field-label">Email</label>
          <input type="email" name="email" class="input" placeholder="your@email.com" required />
        </div>
        <div class="field-group">
          <label class="field-label">Password</label>
          <input type="password" name="password" class="input" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-analyze">Create Account</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="/login">Sign in</a></p>
    </div>
  </section>
</body>
</html>
